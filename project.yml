name: CyphrWhispr
options:
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "2"
    PRODUCT_BUNDLE_IDENTIFIER: com.cyphr.whispr
    DEVELOPMENT_TEAM: ""
    # Sign with a stable self-signed cert kept in the user's login Keychain so
    # the binary's signature stays constant across rebuilds. macOS TCC tracks
    # apps by signature, not bundle ID, so a stable signature means we grant
    # Accessibility / Microphone / Apple Events ONCE and they stick.
    # Create the cert once via Keychain Access → Certificate Assistant →
    # "Create a Certificate…" with name "CyphrWhispr Dev", type Self Signed Root,
    # certificate type Code Signing.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "CyphrWhispr Dev"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  # Zetetic's official SQLCipher Swift package — a binary xcframework, so no
  # in-tree C compilation. Backs the Phase 4 encrypted transcription history
  # (AES-256). NOTE: encryption is silently a no-op unless the consuming
  # target also defines SQLITE_HAS_CODEC=1 — see GCC_PREPROCESSOR_DEFINITIONS
  # in the CyphrWhispr target settings below.
  SQLCipher:
    url: https://github.com/sqlcipher/SQLCipher.swift
    from: "4.16.0"

targets:
  CyphrWhispr:
    type: application
    platform: macOS
    sources:
      - path: CyphrWhispr
        excludes:
          - "**/*.md"
    resources:
      - path: CyphrWhispr/Resources/Assets.xcassets
      # Bundled fonts. The four .otf files get copied to Resources/Fonts/
      # in the built app bundle; ATSApplicationFontsPath in Info.plist
      # points at that subdirectory so macOS registers them at launch.
      # SIL OFL — see Resources/Fonts/LICENSE.txt for the license bundled
      # with the binary alongside the fonts themselves.
      - path: CyphrWhispr/Resources/Fonts
    dependencies:
      - package: KeyboardShortcuts
      - package: WhisperKit
        product: WhisperKit
      - package: SQLCipher
        product: SQLCipher
    info:
      path: CyphrWhispr/Resources/Info.plist
      properties:
        CFBundleName: CyphrWhispr
        CFBundleDisplayName: CyphrWhispr
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSMicrophoneUsageDescription: "CyphrWhispr listens to your microphone only when you hold or toggle the dictation hotkey, transcribes locally on your Mac, and never sends audio anywhere."
        NSHumanReadableCopyright: ""
        # Tells AppKit to register every font file inside the bundle's
        # Resources/ directory at launch — used to ship Monaspace Krypton
        # (the Settings UI font) without per-user installation. We use "."
        # rather than "Fonts/" because Xcode resource refs in this project
        # land flat in Contents/Resources/ regardless of source layout.
        ATSApplicationFontsPath: "."
        # Custom URL scheme `cyphr-whispr://`. Used as a lightweight remote
        # for the running app — `open cyphr-whispr://open-settings` opens
        # the Settings window without the user clicking the menu bar icon.
        # Primarily for developer / scripting workflows (UI screenshots,
        # automation); also makes future deep-linking trivial.
        CFBundleURLTypes:
          - CFBundleURLName: com.cyphr.whispr
            CFBundleURLSchemes:
              - cyphr-whispr
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: CyphrWhispr/Resources/CyphrWhispr.entitlements
        INFOPLIST_FILE: CyphrWhispr/Resources/Info.plist
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
        # Required by SQLCipher.swift: without SQLITE_HAS_CODEC the linked
        # library behaves as plain SQLite and `PRAGMA key` is ignored — the
        # history vault would be written UNENCRYPTED. Keep this in sync with
        # the SQLCipher package declared above.
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "SQLITE_HAS_CODEC=1"
    preBuildScripts:
      - name: Strip iCloud xattrs from sources (prevents codesign failure)
        # iCloud Drive's FileProvider attaches `com.apple.FinderInfo` and other
        # xattrs to files inside ~/Documents. Xcode preserves those attributes
        # through Copy Resources, and `codesign` then refuses to sign with
        # "resource fork, Finder information, or similar detritus not allowed."
        # Stripping the source tree before Xcode reads it sidesteps the entire
        # chain. Cheap (xattr -cr is essentially free).
        script: |
          xattr -cr "${SRCROOT}/CyphrWhispr" 2>/dev/null || true
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - name: Strip xattrs from built bundle (belt-and-suspenders)
        script: |
          if [ -d "$CODESIGNING_FOLDER_PATH" ]; then
            xattr -cr "$CODESIGNING_FOLDER_PATH" 2>/dev/null || true
          fi
        basedOnDependencyAnalysis: false

  CyphrWhisprTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CyphrWhisprTests
    dependencies:
      - target: CyphrWhispr
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cyphr.whispr.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CyphrWhispr.app/Contents/MacOS/CyphrWhispr"
